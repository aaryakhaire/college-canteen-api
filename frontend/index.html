<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Canteen - Menu</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <div class="app">
    <header class="header">
      <h1>College Canteen Dashboard</h1>
      <p>Manage menu items connected to your PostgreSQL backend.</p>

      <div class="status">
        Backend: <span id="backendStatus" class="badge">Checking...</span>
      </div>

      <div class="nav">
        <a class="btn primary" href="./index.html">Menu</a>
        <a class="btn" href="./orders.html">Orders</a>
      </div>
    </header>

    <main class="grid">
      <!-- Add/Edit Item Form -->
      <section class="card">
        <h2 id="formTitle">Add Menu Item</h2>

        <form id="menuForm" class="form">
          <input id="editId" type="hidden" />

          <div class="field">
            <label>Name</label>
            <input id="name" type="text" placeholder="e.g. Vadapav" required />
          </div>

          <div class="field">
            <label>Price</label>
            <input id="price" type="number" step="0.01" placeholder="e.g. 20" required />
          </div>

          <div class="field">
            <label>Category</label>
            <input id="category" type="text" placeholder="e.g. Snacks" required />
          </div>

          <div class="btn-row">
            <button type="submit" class="btn primary" id="submitBtn">Add Item</button>
            <button type="button" class="btn" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
          </div>
        </form>

        <p id="formMsg" class="muted"></p>
      </section>

      <!-- Menu List -->
      <section class="card">
        <div class="card-top">
          <h2>Menu Items</h2>
          <button id="refreshBtn" class="btn">Refresh</button>
        </div>

        <div class="filters">
          <input id="searchInput" type="text" placeholder="Search by name..." />
          <select id="availabilityFilter">
            <option value="ALL">All</option>
            <option value="AVAILABLE">Available</option>
            <option value="UNAVAILABLE">Unavailable</option>
          </select>
        </div>

        <div id="menuList" class="menu-list">
          Loading...
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Built with Flask + PostgreSQL + Postman | Frontend: HTML/CSS/JS</p>
    </footer>
  </div>

  <script src="./menu.js"></script>
</body>
</html>
